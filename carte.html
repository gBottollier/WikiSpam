<!DOCTYPE html>
<html lang="fr">
<head>
  <script>if(sessionStorage.getItem('sw')!=='1'){location.replace('login.html?r='+encodeURIComponent(location.pathname.split('/').pop()||'index.html'));}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPAM LORE</title>
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/background_stars.css">
  <link rel="stylesheet" href="css/carte.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
  <!-- Navbar -->

  <!-- Background -->
  <div class="background-stars"></div>

  <!-- CARTE -->
  <div id="map-stage">

    <div id="world-pane">
      <div id="world-content">
        <img id="world-img" src="img/map/world.webp" alt="Carte du monde" draggable="false">
        <div id="region-detail-layer"></div>
        <svg id="region-svg" viewBox="0 0 1 1" preserveAspectRatio="none"></svg>
        <div id="poi-layer"></div>
      </div>
    </div>

    <!-- Mobile-only: swipe through continents one at a time (highlighting
         each on the full map, with nothing drawn over it) instead of
         tapping a tiny shape directly; "Zoom in" commits to it. Uses the
         empty letterbox bars above/below the map: description up top,
         name + zoom button down bottom. Populated by carte.js from
         MAP_REGIONS. -->
    <div id="continent-card-top">
      <h3 id="continent-card-name"></h3>
      <p id="continent-card-desc"></p>
    </div>

    <div id="continent-card-bar">
      <span id="continent-card-progress"></span>
      <button id="continent-zoom-in">Zoom +</button>
    </div>

    <p id="map-hint">
      <span class="hint-desktop">Survolez un continent pour le découvrir, cliquez pour l'explorer</span>
      <span class="hint-mobile">Glissez pour parcourir les continents, "Zoom +" pour explorer</span>
    </p>

    <!-- Shown only while zoomed into a region -->
    <button id="back-btn">
      <span class="hint-desktop">&larr; Retour à la carte</span>
      <span class="hint-mobile">&larr; Zoom −</span>
    </button>
    <div id="region-info">
      <h2 id="region-title"></h2>
      <p id="region-desc"></p>
      <!-- Mobile-only: a tappable list of this region's points of
           interest — small dots scattered on a detail image are hard to
           find by touch, this is a reliable alternative way to reach the
           same tooltips. -->
      <div id="region-poi-list"></div>
    </div>

    <!-- Tooltip -->
    <div id="map-tooltip" class="map-tooltip hidden">
      <h3 id="tooltip-title"></h3>
      <p id="tooltip-desc"></p>
    </div>

  </div>
  <!-- CARTE -->

  <!-- Script -->
  <script src="js/map-data.js"></script>
  <script src="js/carte.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/background_stars.js"></script>
  <!-- Script -->

</body>
</html>
